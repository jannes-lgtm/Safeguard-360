# ── Production (main branch) ──────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "api"

# ── Staging (staging branch) — separate deploy preview ───────────────────────
# In Netlify dashboard: set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY
# as branch-specific env vars pointing to the same Supabase project.
# Staging deploys to a separate URL so testers on main are never affected.
[context.staging]
  command = "npm run build"

[functions]
  node_bundler = "esbuild"

  # Allow data-heavy functions enough time to fetch feeds + call AI
  [functions."country-risk"]
    timeout = 26

  [functions."rss-ingest"]
    timeout = 26

  [functions."trip-alert-scan"]
    timeout = 26

  [functions."ai-assistant"]
    timeout = 26

  [functions."weather-alerts"]
    timeout = 26

  [functions."acled"]
    timeout = 26

# Route /api/* calls to Netlify functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Route all other requests through the React app (required for React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
